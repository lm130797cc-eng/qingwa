<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AI易经取名 - 实时决策看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* 周易科技风色调 */
            --primary-color: #ffd700; /* 乾卦金 */
            --secondary-color: #d32f2f; /* 离火红 */
            --accent-color: #00f2fe;    /* 震雷蓝 */
            --text-color: #e0e0e0;
            --card-bg: rgba(20, 24, 35, 0.8);
            --border-color: rgba(211, 47, 47, 0.3);
            --success-color: #4caf50;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle at top center, #1a1a2e 0%, #050505 100%);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            min-height: 100vh;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .grid-container, .chart-row { grid-template-columns: 1fr !important; }
            .header h1 { font-size: 20px !important; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .header h1 {
            margin: 0;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .stat-title { color: #aaa; font-size: 13px; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 28px; font-weight: 800; color: #fff; }

        .chart-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-box { height: 300px; position: relative; }

        .list-container {
            height: 280px;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(211, 47, 47, 0.2);
            color: var(--secondary-color);
        }

        .btn-refresh {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        /* 登录与弹窗逻辑 */
        .modal {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--primary-color);
            text-align: center;
            width: 300px;
        }

        .modal input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            padding: 10px;
            color: #fff;
            width: 80%;
            margin: 15px 0;
            border-radius: 4px;
            text-align: center;
            letter-spacing: 2px;
        }

        .modal button {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Map Styles */
        .map-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: url('https://cdn.jsdelivr.net/gh/markmarkoh/datamaps/dist/world.svg') no-repeat center;
            background-size: contain;
            filter: brightness(0.6) sepia(1) hue-rotate(-10deg) saturate(2); /* Dark Gold / Bagua Style */
        }

        .map-card {
            grid-column: span 2; /* Full width */
        }

        /* Pulse Point Animation */
        .pulse-point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-color);
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .pulse-point::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            animation: mapPulse 2s infinite ease-out;
        }

        @keyframes mapPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        .location-tag {
            position: absolute;
            padding: 2px 8px;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--secondary-color);
            border-radius: 4px;
            font-size: 10px;
            color: #fff;
            pointer-events: none;
            white-space: nowrap;
            z-index: 11;
        }
    </style>
</head>
<body>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-color)">🔒 内部机密系统</h2>
            <p style="font-size: 12px; color: #aaa;">非管理员严禁访问</p>
            <input type="password" id="passwordInput" placeholder="请输入访问密钥">
            <button onclick="checkAuth()">解锁天机</button>
            <p id="authError" style="color: var(--secondary-color); font-size: 12px; margin-top: 10px; display: none;">❌ 密钥错误，系统已锁定</p>
        </div>
    </div>

    <div class="header">
        <h1>☯️ AI 易经取名·全球增长看板</h1>
        <button class="btn-refresh" onclick="refreshData()">🔄 同步天机</button>
    </div>

    <div class="grid-container">
        <div class="card">
            <span class="stat-title">今日算命总数</span>
            <span class="stat-value" id="v-today-names">1,284</span>
        </div>
        <div class="card">
            <span class="stat-title">累计成交金额 (CNY)</span>
            <span class="stat-value" id="v-total-revenue">¥ 52,900</span>
        </div>
        <div class="card">
            <span class="stat-title">当前在线求名</span>
            <span class="stat-value" id="v-online" style="color: var(--success-color)">89</span>
        </div>
        <div class="card">
            <span class="stat-title">AI模型调用频次</span>
            <span class="stat-value" id="v-ai-calls">45.2k</span>
        </div>
    </div>

    <!-- Map Section -->
    <div class="chart-row" style="grid-template-columns: 1fr; margin-bottom: 20px;">
        <div class="card map-card">
            <h3>🌏 全球华人起名热力分布</h3>
            <div class="map-container" id="world-map">
                <div id="map-points"></div>
            </div>
        </div>
    </div>

    <div class="chart-row">
        <div class="card">
            <h3>📈 24小时用户加入趋势</h3>
            <div class="chart-box">
                <canvas id="growthChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>🔮 取名五行偏好分布</h3>
            <div class="chart-box">
                <canvas id="elementChart"></canvas>
            </div>
        </div>
    </div>

    <div class="chart-row">
        <div class="card">
            <h3>🌍 全球华人分布 (Top 10)</h3>
            <div class="list-container" id="geo-list">
                <!-- JS Fill -->
            </div>
        </div>
        <div class="card">
            <h3>📜 实时起名流水</h3>
            <div class="list-container" id="order-list">
                <!-- JS Fill -->
            </div>
        </div>
    </div>

    <script>
        // Static JSON Data Source
        const DATA_SOURCE = 'dashboard_data.json';
        const AUTH_TOKEN = '88888888'; // Internal static token

        // Chart.js Configuration
        Chart.defaults.color = '#aaa';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.1)';
        let growthChart, elementChart;

        // Geo Coords for Map
        const geoCoords = {
            'CN': { l: '75%', t: '38%', name: '中国' },
            'SG': { l: '78%', t: '62%', name: '新加坡' },
            'US': { l: '18%', t: '35%', name: '美国' },
            'MY': { l: '76%', t: '58%', name: '马来西亚' },
            'TW': { l: '82%', t: '45%', name: '台湾' },
            'HK': { l: '80%', t: '48%', name: '香港' },
            'JP': { l: '85%', t: '35%', name: '日本' },
            'KR': { l: '82%', t: '38%', name: '韩国' },
            'AU': { l: '85%', t: '75%', name: '澳洲' },
            'CA': { l: '20%', t: '25%', name: '加拿大' },
            'GB': { l: '48%', t: '25%', name: '英国' },
            'FR': { l: '49%', t: '28%', name: '法国' },
            'DE': { l: '51%', t: '26%', name: '德国' }
        };

        // Fetch Data Wrapper
        async function fetchData() {
            try {
                // Add timestamp to prevent caching
                const res = await fetch(`${DATA_SOURCE}?t=${Date.now()}`);
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error(`Failed to fetch data:`, e);
                if (window.location.protocol === 'file:') {
                    alert('⚠️ 检测到文件直接打开 (file://)。\n现代浏览器通常会拦截本地 JSON 读取 (CORS 策略)。\n\n建议：\n1. 使用 VS Code 插件 "Live Server" 打开\n2. 或在终端运行 `npx serve`\n3. 或忽略此提示 (数据将显示为 0)');
                }
                return null;
            }
        }

        async function initDashboard() {
            const data = await fetchData();
            if (data) {
                updateOverview(data.overview);
                initCharts(data);
                updateLists(data);
            }
            startMapSimulation();
        }

        function updateOverview(overview) {
            if (!overview) return;
            document.getElementById('v-today-names').innerText = (overview.users || 0).toLocaleString();
            document.getElementById('v-total-revenue').innerText = '¥ ' + (overview.revenue || '0.00');
            document.getElementById('v-online').innerText = overview.online || 0;
            document.getElementById('v-ai-calls').innerText = (overview.ai_calls || 0).toLocaleString();
        }

        function initCharts(data) {
            // Growth Chart
            const ctx1 = document.getElementById('growthChart').getContext('2d');
            const growthLabels = data.growth ? data.growth.map(d => d.hour + 'h') : [];
            const growthCounts = data.growth ? data.growth.map(d => d.count) : [];
            
            growthChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: growthLabels,
                    datasets: [{
                        label: '新增用户',
                        data: growthCounts,
                        borderColor: '#ffd700',
                        backgroundColor: 'rgba(255, 215, 0, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Element Chart
            const ctx2 = document.getElementById('elementChart').getContext('2d');
            const elemLabels = data.elements ? data.elements.map(d => d.label) : [];
            const elemValues = data.elements ? data.elements.map(d => d.value) : [];
            
            elementChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: elemLabels,
                    datasets: [{
                        data: elemValues,
                        backgroundColor: ['#ffd700', '#4caf50', '#2196f3', '#d32f2f', '#795548'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } }
                }
            });
        }

        function updateLists(data) {
            // Geo List (Updated for Flags)
            if (data.geo) {
                document.getElementById('geo-list').innerHTML = data.geo.map(item => `
                    <div class="list-item">
                        <span>${item.f || '🏳️'} ${item.n || 'Unknown'}</span>
                        <span style="font-weight:bold; color:var(--primary-color)">${item.percentage}</span>
                    </div>
                `).join('');
            }

            // Order List
            if (data.orders) {
                document.getElementById('order-list').innerHTML = data.orders.map(order => `
                    <div class="list-item">
                        <span style="color:#666">${order.time}</span>
                        <span>${order.username}</span>
                        <span class="tag">${order.package_type}</span>
                        <span style="color:var(--success-color)">${order.amount}</span>
                    </div>
                `).join('');
            }
        }

        // Map Visuals
        function renderLivePoint(countryCode) {
            const coord = geoCoords[countryCode];
            if (!coord) return;

            const mapPoints = document.getElementById('map-points');
            // If mapPoints is null (e.g. before DOM ready), return
            if (!mapPoints) return;
            
            const pointId = 'pt-' + Date.now() + Math.random();
            
            const html = `
                <div id="${pointId}" class="pulse-point" style="left: ${coord.l}; top: ${coord.t};">
                    <div class="location-tag" style="margin-top: -25px; margin-left: 10px;">
                        ${coord.name} · 起名中...
                    </div>
                </div>
            `;
            
            mapPoints.insertAdjacentHTML('beforeend', html);

            // Remove after 5s
            setTimeout(() => {
                const el = document.getElementById(pointId);
                if (el) el.remove();
            }, 5000);
        }

        function startMapSimulation() {
            // Simulate random activity based on known coords
            setInterval(() => {
                const codes = Object.keys(geoCoords);
                const randomCode = codes[Math.floor(Math.random() * codes.length)];
                renderLivePoint(randomCode);
            }, 3000);
        }

        async function refreshData() {
            const btn = document.querySelector('.btn-refresh');
            btn.innerHTML = '⌛ 同步中...';
            btn.disabled = true;
            
            const data = await fetchData();
            if (data) {
                updateOverview(data.overview);
                updateLists(data);
                
                // Update charts
                if (growthChart && data.growth) {
                    growthChart.data.labels = data.growth.map(d => d.hour + 'h');
                    growthChart.data.datasets[0].data = data.growth.map(d => d.count);
                    growthChart.update();
                }
                if (elementChart && data.elements) {
                    elementChart.data.labels = data.elements.map(d => d.label);
                    elementChart.data.datasets[0].data = data.elements.map(d => d.value);
                    elementChart.update();
                }
            }
            
            btn.innerHTML = '🔄 同步天机';
            btn.disabled = false;
        }

        // Initialization
        window.onload = () => {
            // Security Checks - Allow Localhost, 127.0.0.1, and File Protocol
            const isLocal = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' || 
                           window.location.protocol === 'file:' ||
                           window.location.hostname === ''; // Some browsers return empty hostname for file://

            if (!isLocal) {
                document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:20%">🚫 SYSTEM LOCKED: LOCAL ACCESS ONLY</h1>';
                return;
            }

            // Auth Check
            if (sessionStorage.getItem('admin_unlocked') === 'true') {
                document.getElementById('authModal').style.display = 'none';
                initDashboard();
            }
        };

        function checkAuth() {
            const pwd = document.getElementById('passwordInput').value;
            const err = document.getElementById('authError');
            
            if (pwd === AUTH_TOKEN) {
                document.getElementById('authModal').style.display = 'none';
                sessionStorage.setItem('admin_unlocked', 'true');
                initDashboard();
            } else {
                err.style.display = 'block';
                err.innerText = '❌ 密钥错误，系统已锁定';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        }
    </script>
    <script>
        // 幽灵模式：隐藏所有调试信息
        (function() {
          // 1. 禁用 console.log/warn/error (生产环境)
          if (window.location.protocol !== 'file:' && !window.location.hostname.includes('localhost')) {
            console.log = console.warn = console.error = function() {};
          }
          
          // 2. 隐藏常见调试元素
          const debugSelectors = [
            '#debug-status', '#dev-tools', '.debug-output', 
            '[data-debug]', '[data-test]', '.console-mock'
          ];
          debugSelectors.forEach(sel => {
            const el = document.querySelector(sel);
            if (el) el.style.display = 'none';
          });
          
          // 3. 移除含"Localhost Check"、"File Protocol"、"Crash"关键词的元素
          document.querySelectorAll('*').forEach(el => {
            const text = el.textContent || '';
            if (text.includes('Localhost Check') || 
                text.includes('File Protocol') || 
                text.includes('Crash: Resolved')) {
              el.style.display = 'none';
            }
          });
        })();
    </script>
</body>
</html>
