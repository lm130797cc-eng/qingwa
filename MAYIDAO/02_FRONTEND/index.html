<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>🐜 蚂蚁岛 | AI文化命名</title>
    <meta name="description" content="蚂蚁岛 - AI+传统文化命名咨询，支持推广返佣与积分内循环。" />

    <link rel="stylesheet" href="/assets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🐜 蚂蚁岛</h1>
        <div style="margin-top:8px;font-size:0.95rem;opacity:0.95;">
          AI + 传统文化 · 手机秒开 · 全球 CDN
        </div>
      </header>

      <main>
        <div class="card text-center">
          <h2 style="margin:0 0 8px;">🎁 领取新人福利</h2>
          <p style="margin:0 0 8px;">访问即自动绑定推荐码并保存到本机。</p>
          <div style="font-size:0.9rem;color:#666;">
            当前推荐码：<span id="refCodeText" class="gold-text">--</span>
          </div>
        </div>

        <div class="card text-center">
          <h2 style="margin:0 0 8px;">✨ 个人命名文化咨询</h2>
          <p style="margin:0;">融合音韵、美学与五行结构，生成多方案可选报告。</p>
          <a class="btn" id="startPersonal" href="#">立即体验</a>
        </div>

        <div class="card text-center">
          <h2 style="margin:0 0 8px;">🏢 企业命名文化咨询</h2>
          <p style="margin:0;">结合行业属性与传播力，输出品牌级命名建议。</p>
          <a class="btn btn-secondary" id="startEnterprise" href="#">立即体验</a>
        </div>

        <div class="card text-center" style="border:1px dashed #ddd;">
          <h3 style="margin:0 0 8px;">🤖 Telegram 自动核验</h3>
          <p style="margin:0 0 10px;color:#666;">支付后发 TXID，自动到账并发放权益。</p>
          <a class="btn btn-secondary" id="openBot" href="#" target="_blank" rel="noopener noreferrer">打开机器人</a>
        </div>
      </main>

      <footer>
        <div>⚠️ 仅供文化娱乐与美学参考，不涉及命运预测</div>
        <div style="margin-top:6px;">© MAYIDAO</div>
      </footer>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var ref = params.get('ref');
        if (ref && ref.length > 0) {
          try { localStorage.setItem('ant_ref', ref); } catch (e) {}
        } else {
          try { ref = localStorage.getItem('ant_ref') || ''; } catch (e) { ref = ''; }
        }

        var refText = document.getElementById('refCodeText');
        if (refText) refText.textContent = ref || 'DIRECT';

        var botUser = (window.MAYIDAO_CONFIG && window.MAYIDAO_CONFIG.telegram && window.MAYIDAO_CONFIG.telegram.botUsername) ? window.MAYIDAO_CONFIG.telegram.botUsername : '';
        var openBot = document.getElementById('openBot');
        if (openBot) {
          openBot.href = botUser ? ('https://t.me/' + botUser + (ref ? ('?start=' + encodeURIComponent(ref)) : '')) : 'https://t.me/';
        }

        var toPersonal = document.getElementById('startPersonal');
        if (toPersonal) toPersonal.href = '/' + (ref ? ('?ref=' + encodeURIComponent(ref)) : '') + '#service';

        var toEnterprise = document.getElementById('startEnterprise');
        if (toEnterprise) toEnterprise.href = '/' + (ref ? ('?ref=' + encodeURIComponent(ref)) : '') + '#service';
      })();
    </script>

    <!-- Referral Rewards Section -->
    <section id="referral-dashboard" class="container" style="margin-top:20px;">
      <div class="card" style="border:1px solid #eee;">
        <h3 style="text-align:center; color:#8b0000; margin-top:0;">🎁 我的推荐奖励</h3>
        <div style="text-align:center; margin-bottom:15px;">
          <input type="text" id="myRefCodeInput" placeholder="输入您的推荐码 (如 ANT...)" style="padding:8px; width:180px; border:1px solid #ddd; border-radius:4px;">
          <button onclick="checkMyRewards()" class="btn" style="width:auto; display:inline-block; padding:8px 16px; margin-top:5px; background:#d4af37;">查询</button>
        </div>
        <div id="rewards-loading" style="display:none; text-align:center; color:#666; margin-bottom:10px;">加载中...</div>
        <div class="table-responsive">
          <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
            <thead>
              <tr style="background:#f9f9f9; border-bottom:2px solid #eee;">
                <th style="padding:8px; text-align:left;">层级</th>
                <th style="padding:8px; text-align:left;">来源</th>
                <th style="padding:8px; text-align:right;">奖励</th>
                <th style="padding:8px; text-align:right;">时间</th>
              </tr>
            </thead>
            <tbody id="rewards-list">
              <tr><td colspan="4" style="text-align:center; padding:15px; color:#999;">请输入推荐码查询</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <script>
    async function checkMyRewards() {
      const refCode = document.getElementById('myRefCodeInput').value.trim();
      if (!refCode) return alert('请输入推荐码');
      
      const supabase = window.initSupabase();
      if (!supabase) return alert('系统连接失败');

      document.getElementById('rewards-loading').style.display = 'block';
      document.getElementById('rewards-list').innerHTML = '';
      
      try {
        // 1. Get User ID from Ref Code
        const { data: user, error: uErr } = await supabase
          .from('users')
          .select('id')
          .eq('ref_code', refCode)
          .single();
          
        if (uErr || !user) {
          document.getElementById('rewards-loading').style.display = 'none';
          document.getElementById('rewards-list').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:15px; color:red;">未找到该推荐码</td></tr>';
          return;
        }
        
        // 2. Load Rewards
        await loadReferralRewards(user.id, supabase);
      } catch (e) {
        console.error(e);
        alert('查询失败');
      } finally {
        document.getElementById('rewards-loading').style.display = 'none';
      }
    }

    async function loadReferralRewards(userId, supabase) {
      const { data, error } = await supabase
        .from('gas_transactions')
        .select('referral_level, description, amount, created_at')
        .eq('user_id', userId)
        .eq('transaction_type', 'referral_reward')
        .order('created_at', { ascending: false });

      const tbody = document.getElementById('rewards-list');
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:15px;">暂无奖励记录</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(r => `
        <tr style="border-bottom:1px solid #eee;">
          <td style="padding:8px;">L${r.referral_level || 1}</td>
          <td style="padding:8px;">${r.description?.match(/order (\w+)/)?.[1]?.slice(0,6) || 'Order'}...</td>
          <td style="padding:8px; text-align:right; color:#d4af37; font-weight:bold;">+${r.amount}</td>
          <td style="padding:8px; text-align:right; color:#666; font-size:0.8rem;">${new Date(r.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }
    
    // Auto-check if ref code is stored locally and it matches the user's intent? 
    // Usually local storage 'ant_ref' is the *referrer*, so we don't auto-fill it as *my* code.
    </script>

    <script src="/assets/app.js"></script>
  </body>
</html>
