<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业命名 - 蚂蚁岛</title>
    <style>
        :root {
            --primary: #ffd700;
            --secondary: #d4af37;
            --bg: #f9f7f2;
            --text: #333;
            --accent: #8b0000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            opacity: 0.9;
        }
        .donation-gate {
            background: #fff9e6;
            border: 1px solid #ffeba0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .donation-gate p {
            margin: 0 0 10px;
            color: #856404;
            font-weight: bold;
        }
        .donation-gate button {
            background: var(--secondary);
            font-size: 14px;
            padding: 8px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏢 企业命名文化咨询</h1>
    <p class="subtitle">结合行业属性与文化契合度，打造品牌传播力</p>

    <!-- enterprise_naming.html 核心表单 -->
    <form id="enterprise-form" onsubmit="submitEnterprise(event)">
        <input type="text" id="company-name" placeholder="公司名称/意向 (如: 蚂蚁科技)" required>
        <input type="text" id="industry" placeholder="所属行业 (如: 互联网/餐饮)" required>
        <textarea id="preferences" rows="3" placeholder="文化偏好/关键词 (如: 稳重, 创新, 五行缺火)"></textarea>
        
        <!-- 捐赠引导（88元门槛） -->
        <div class="donation-gate" id="gate-overlay">
            <p>💰 需成为岛民 (捐赠 ¥88 / 12 USDT)</p>
            <button type="button" onclick="window.location.href='donate.html'">立即捐赠解锁</button>
        </div>
        
        <!-- 提交按钮（仅岛民可见） -->
        <button type="submit" id="submit-btn" disabled>🚀 生成专业报告</button>
    </form>

    <a href="index.html" class="back-link">返回首页</a>
</div>

<script>
// 检查岛民状态
function checkIslandAccess() {
    // 简单检查 localStorage，实际可结合后端 API 验证
    const isMember = localStorage.getItem('island_member') === 'true';
    const donationStatus = localStorage.getItem('donation_status') === 'completed';
    
    const hasAccess = isMember || donationStatus;
    
    const btn = document.getElementById('submit-btn');
    const gate = document.getElementById('gate-overlay');
    
    if (hasAccess) {
        btn.disabled = false;
        btn.textContent = "🚀 生成专业报告";
        gate.style.display = 'none'; // 隐藏捐赠门槛
    } else {
        btn.disabled = true;
        btn.textContent = "🔒 请先解锁";
        gate.style.display = 'block';
    }
    return hasAccess;
}

// 页面加载时检查
document.addEventListener('DOMContentLoaded', checkIslandAccess);

function submitEnterprise(e) {
    e.preventDefault();
    if (!checkIslandAccess()) {
        alert('请先完成捐赠成为岛民，即可解锁企业命名服务~');
        window.location.href = 'donate.html';
        return;
    }
    
    // 收集表单数据 + 调用后端API
    const data = {
        company_name: document.getElementById('company-name').value,
        industry: document.getElementById('industry').value,
        preferences: document.getElementById('preferences').value,
        ref_code: localStorage.getItem('ant_ref') || 'DIRECT',
        service_type: 'enterprise'
    };
    
    // 提交按钮 loading
    const btn = document.getElementById('submit-btn');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "⏳ 处理中...";

    fetch('http://localhost:3001/api/enterprise/naming', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.success || result.orderId) {
            alert('✅ 需求已提交！系统正在生成报告，请关注审查窗口或 Telegram 通知。');
            // 可以跳转到结果页或重置表单
            document.getElementById('enterprise-form').reset();
        } else {
            alert('❌ 提交失败: ' + (result.error || '未知错误'));
        }
    })
    .catch(err => {
        console.error(err);
        alert('❌ 网络错误，请检查后端服务是否启动');
    })
    .finally(() => {
        btn.disabled = false;
        btn.textContent = originalText;
    });
}
</script>

</body>
</html>
