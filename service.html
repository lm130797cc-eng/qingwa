<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="蚂蚁岛 - 岛民专属服务"> 
  <title>🐜 蚂蚁岛 | 岛民服务</title>
  <script src="config.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f7f2; color: #333; margin: 0; padding: 16px; }
    .card { max-width: 520px; margin: 20px auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { margin: 0 0 10px; color: #8b0000; font-size: 20px; }
    .btn { display: block; width: 100%; padding: 14px; background: #8b0000; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; text-align: center; text-decoration: none; cursor: pointer; }
    .btn-secondary { background: #d4af37; color: #000; }
    .muted { font-size: 13px; color: #666; line-height: 1.6; }
    .disclaimer { font-size: 12px; color: #999; margin-top: 14px; padding-top: 12px; border-top: 1px solid #eee; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">岛民专属服务</h1>
    <div class="muted" id="desc">请在 Telegram 内完成捐赠核验后解锁服务。</div>

    <div style="height: 12px;"></div>

    <a class="btn" id="tgLink" href="#" target="_blank" rel="noreferrer">前往 Telegram 继续</a>
    <div style="height: 10px;"></div>
    <a class="btn btn-secondary" href="index.html">返回首页</a>

    <div class="disclaimer">
      仅供文化娱乐参考，不涉及命运预测。<br>
      积分仅供站内服务兑换，不可提现。
    </div>
  </div>

  <script>
    (function() {
      if (typeof window.checkIslandAccess === 'function') {
        const ok = window.checkIslandAccess();
        if (!ok) return;
      }

      const params = new URLSearchParams(window.location.search);
      const type = (params.get('type') || 'personal').toLowerCase();
      const isEnterprise = type === 'enterprise';

      const title = document.getElementById('title');
      const desc = document.getElementById('desc');
      const tgLink = document.getElementById('tgLink');

      title.textContent = isEnterprise ? '企业命名文化咨询' : '个人命名文化咨询';
      desc.innerHTML = isEnterprise
        ? '岛民专属通道：提交企业信息后生成文化命名报告。'
        : '岛民专属通道：提交个人信息后生成文化命名报告。';

      const botUsername = (window.MAYIDAO_CONFIG && window.MAYIDAO_CONFIG.telegram && window.MAYIDAO_CONFIG.telegram.botUsername) || 'AntIslandBot';
      const ref = localStorage.getItem('ant_ref') || 'DIRECT';
      const payload = isEnterprise ? ('service_enterprise_' + ref) : ('service_personal_' + ref);
      tgLink.href = `https://t.me/${botUsername}?start=${encodeURIComponent(payload)}`;
    })();
  </script>
</body>
</html>
