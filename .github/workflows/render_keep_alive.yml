name: Render Keep Alive (Smart Ping)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render with content validation
        run: |
          RESPONSE=$(curl -sS -m 30 -w "\n%{http_code}" -L https://qingwa.onrender.com/health)
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ] && echo "$BODY" | grep -qi 'ok'; then
            echo "✅ Service is awake and healthy"
            exit 0
          else
            echo "⚠️ Service may be sleeping or unhealthy"
            sleep 5
            curl -sS -m 30 -L https://qingwa.onrender.com/health > /dev/null || true
            echo "🔄 Second wake-up attempt sent"
            exit 0
          fi
